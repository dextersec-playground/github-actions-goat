name: PR Target Workflow

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  pr-target-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }} 
          
      - name: Install dependencies
        run: |
          cd src/exfiltration-demo
          npm install

      - name: Wait for 2 minutes
        run: sleep 120
